<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Catatan Keuangan Mahasiswa</title>
<meta name="theme-color" content="#e9598c" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
  :root {
    --pink-bg: #fff0f5;
    --pink-primary: #e9598c;
    --pink-primary-dark: #cf4478;
    --pink-soft: #fddceb;
    --text-dark: #3a2c33;
    --text-muted: #8c7680;
    --income: #2e9e56;
    --expense: #d94f4f;
    --white: #ffffff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--pink-bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text-dark);
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--pink-bg);
  }

  h1, h2 { margin: 0 0 4px 0; }
  h1 { font-size: 22px; font-weight: 700; }
  h2 { font-size: 19px; font-weight: 700; padding: 20px 20px 4px; }

  .subtitle { color: var(--text-muted); font-size: 13px; margin: 0 0 16px; padding: 0 20px; }
  .subtitle-light { color: rgba(255,255,255,0.85); font-size: 13px; margin: 4px 0 20px; }

  label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin: 12px 20px 6px;
  }

  input, select {
    width: calc(100% - 40px);
    margin: 0 20px;
    padding: 12px 14px;
    border: 1.5px solid var(--pink-soft);
    border-radius: 12px;
    font-size: 15px;
    background: var(--white);
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--pink-primary); }

  .onboarding { padding: 24px 0 40px; }
  .onboarding h1 { padding: 0 20px; }

  .error, .error-light {
    font-size: 12px;
    margin: 8px 20px;
    min-height: 16px;
  }
  .error { color: var(--expense); }
  .error-light { color: #ffe0e0; text-align: center; }

  button {
    font-family: inherit;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.08s, opacity 0.15s;
  }
  button:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--pink-primary);
    color: white;
    padding: 14px;
    width: calc(100% - 40px);
    margin: 16px 20px 0;
  }
  .btn-primary:hover { background: var(--pink-primary-dark); }

  .btn-secondary {
    background: #efe3e8;
    color: var(--text-dark);
    padding: 14px;
    width: 100%;
  }

  .btn-predict {
    background: #f7c9de;
    color: var(--pink-primary-dark);
    padding: 12px;
    width: calc(100% - 40px);
    margin: 16px 20px 0;
  }

  .btn-white {
    background: white;
    color: var(--pink-primary-dark);
    padding: 13px;
    width: 200px;
    margin: 0 auto;
    display: block;
  }

  .btn-link {
    background: transparent;
    color: rgba(255,255,255,0.9);
    font-size: 12px;
    font-weight: 400;
    text-decoration: underline;
    padding: 8px;
    margin: 12px auto 24px;
    display: block;
  }

  .confidence {
    font-size: 12px;
    color: var(--text-muted);
    margin: 6px 20px 0;
    min-height: 16px;
  }

  /* PIN Lock */
  .pinlock {
    background: linear-gradient(160deg, var(--pink-primary), var(--pink-primary-dark));
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 24px;
  }
  .pinlock-spacer { flex: 1; }
  .pinlock h1 { color: white; }

  .pin-box {
    width: 180px;
    text-align: center;
    font-size: 24px;
    letter-spacing: 8px;
    padding: 12px;
    border-radius: 14px;
    border: none;
    margin: 8px auto;
  }

  /* Home */
  .balance-card {
    background: linear-gradient(135deg, var(--pink-primary), var(--pink-primary-dark));
    color: white;
    padding: 24px 20px;
    border-radius: 0 0 24px 24px;
  }
  .balance-label { font-size: 13px; opacity: 0.85; }
  .balance-value { font-size: 30px; font-weight: 800; margin: 4px 0; }
  .balance-detail { font-size: 12px; opacity: 0.9; }

  .tx-list {
    flex: 1;
    padding: 12px 20px;
    overflow-y: auto;
  }
  .tx-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: 0 1px 4px rgba(233, 89, 140, 0.08);
  }
  .tx-desc { font-size: 14px; font-weight: 600; }
  .tx-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .tx-amount { font-size: 14px; font-weight: 700; white-space: nowrap; }
  .tx-amount.income { color: var(--income); }
  .tx-amount.expense { color: var(--expense); }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 40px;
  }

  .bottom-bar {
    display: flex;
    gap: 8px;
    padding: 12px 20px 20px;
  }
  .bottom-bar button { flex: 1; margin: 0; }

  /* Add screen */
  .add { padding-bottom: 20px; }

  /* Report */
  .bar-chart { padding: 8px 20px; }
  .bar-row { margin-bottom: 16px; }
  .bar-label {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .bar-swatch {
    width: 10px; height: 10px;
    border-radius: 3px;
    display: inline-block;
  }
  .bar-track {
    background: var(--pink-soft);
    border-radius: 8px;
    height: 14px;
    overflow: hidden;
  }
  .bar-fill { height: 100%; border-radius: 8px; transition: width 0.4s; }
  .bar-value { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  ::selection { background: var(--pink-soft); }
</style>
</head>
<body>
<div id="app"></div>

<script src="training-data.js"></script>
<script src="classifier.js"></script>
<script src="storage.js"></script>
<script src="app.js"></script>
</body>
</html>

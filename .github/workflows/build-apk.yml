name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Build APK dengan Buildozer (docker resmi)
        run: |
          docker run --rm -v "${{ github.workspace }}":/home/user/hostcwd \
            kivy/buildozer android debug

      - name: Upload hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-result
          path: bin/*.apk
